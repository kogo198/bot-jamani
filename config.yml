# ═══════════════════════════════════════════════════════
#  Kiplaa Bot — config.yml  (v2.0 optimised)
#  These settings are merged with your .env on startup.
#  You can override any value here.
# ═══════════════════════════════════════════════════════

# ── Database Performance ─────────────────────────────────
DB_BATCH_SIZE: 600              # ⚡ Writes 600 rows per batch (fewer disk ops)
DB_FLUSH_INTERVAL: "2000"       # ⚡ Saves to disk every 2 s (was 5 s)
DB_CACHE_MAX_BYTES: 268435456   # ⚡ 256 MB RAM cache (was 128 MB)
DB_USE_WAL: true                # ⚡ WAL mode — reads don't block writes
DB_BUSY_TIMEOUT_MS: 8000        # ⚡ Fast-fail on DB lock (was 15 s)

