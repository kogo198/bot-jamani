# ── Group Lock / Warning System ──────────────────────────
LOCK_SYSTEM:
  MAX_WARNS: 3              # Warns before action is taken on a member
  SHOW_TRIGGER_IN_REASON: true  # Show what triggered the warning
  DELETE_WARN_AFTER: 3     # Auto-clear warnings after N days

